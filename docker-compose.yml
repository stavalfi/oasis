# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
# Local infra for IdentityHub: Postgres (app data) and Redis (shared cache).
# Credentials and ports come from the project .env. Both services expose a
# healthcheck so the app can wait for them before starting.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-identityhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-identityhub_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-identityhub}
      # Strict auth: force SCRAM-SHA-256 for all connections, no trust auth.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - postgres
      # Strict data handling: reject out-of-range/invalid values loudly.
      - -c
      - "password_encryption=scram-sha-256"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    # Initial password defaults to identityhub_dev_pw when REDIS_PASSWORD is unset.
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-identityhub_dev_pw}
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-identityhub_dev_pw} ping | grep -q PONG"]
      interval: 2s
      timeout: 3s
      retries: 30

  # Kafka (KRaft mode, single node) for the bonus NHI Blog Digest: the scraper
  # produces blog-post events here and the backend consumes them. Auto-creates
  # topics so the `nhi-blog-posts` topic appears on first produce.
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092",
        ]
      interval: 3s
      timeout: 5s
      retries: 30

volumes:
  postgres_data:
  redis_data:
