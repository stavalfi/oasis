  # Headroom LLM-context-compression proxy. Listens on :8787 and
  # transparently compresses Anthropic API traffic — point `claude` at it
  # via `ANTHROPIC_BASE_URL=http://127.0.0.1:8787`. The image bundles the
  # Rust compression core (no HEADROOM_REQUIRE_RUST_CORE=false needed) but
  # downloads ~150 MB of ONNX model weights from HuggingFace on first boot;
  # we mount a named volume on /root/.cache so subsequent restarts reuse
  # the cached model instead of re-fetching it every time.
