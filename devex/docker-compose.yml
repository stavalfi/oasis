# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
services:
  redis:
    image: docker.io/bitnamilegacy/redis-cluster:7.0
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
      REDIS_CLUSTER_REPLICAS: 1
      REDIS_NODES: 127.0.0.1 127.0.0.1 127.0.0.1
      REDIS_CLUSTER_CREATOR: "yes"
      REDIS_CLUSTER_DYNAMIC_IPS: "no"
      REDIS_CLUSTER_ANNOUNCE_IP: 127.0.0.1
      REDIS_PORT_NUMBER: 6479
    ports:
      - "16479:6479"
